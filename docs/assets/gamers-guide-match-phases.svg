<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="120" y1="40" x2="1160" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#24160F"/>
      <stop offset="1" stop-color="#0F0907"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F0BF76"/>
      <stop offset="1" stop-color="#D5752D"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" rx="28" fill="url(#bg2)"/>
  <rect x="28" y="28" width="1224" height="664" rx="24" stroke="#F0BF76" stroke-opacity="0.18" stroke-width="2"/>
  <text x="78" y="102" fill="#F0BF76" font-size="16" font-family="Arial, sans-serif" letter-spacing="4">MATCH FLOW</text>
  <text x="78" y="150" fill="#F6EAD7" font-size="38" font-weight="700" font-family="Arial, sans-serif">What happens during a single showdown</text>
  <text x="78" y="188" fill="#DCCCB7" font-size="19" font-family="Arial, sans-serif">If you know these five phases, the whole arena becomes much easier to read.</text>

  <line x1="160" y1="350" x2="1120" y2="350" stroke="#F0BF76" stroke-opacity="0.28" stroke-width="6" stroke-linecap="round"/>

  <g>
    <circle cx="180" cy="350" r="56" fill="#1A120D" stroke="#F0BF76" stroke-width="3"/>
    <text x="154" y="340" fill="#F6EAD7" font-size="16" font-family="Arial, sans-serif">QUEUE</text>
    <text x="145" y="365" fill="#DCCCB7" font-size="14" font-family="Arial, sans-serif">Wait for riders</text>
    <text x="108" y="446" fill="#F6EAD7" font-size="24" font-weight="700" font-family="Arial, sans-serif">1. Queue Locked</text>
    <text x="108" y="476" fill="#DCCCB7" font-size="18" font-family="Arial, sans-serif">You choose the rider, pick practice or paid,</text>
    <text x="108" y="502" fill="#DCCCB7" font-size="18" font-family="Arial, sans-serif">and wait for the field to fill.</text>
  </g>

  <g>
    <circle cx="420" cy="350" r="56" fill="#16161E" stroke="#9CE9FF" stroke-width="3"/>
    <text x="393" y="340" fill="#DFF9FF" font-size="16" font-family="Arial, sans-serif">BELL</text>
    <text x="377" y="365" fill="#DCCCB7" font-size="14" font-family="Arial, sans-serif">Riders frozen</text>
    <text x="348" y="446" fill="#F6EAD7" font-size="24" font-weight="700" font-family="Arial, sans-serif">2. Countdown</text>
    <text x="348" y="476" fill="#DCCCB7" font-size="18" font-family="Arial, sans-serif">Everyone is locked in place. Find the cyan</text>
    <text x="348" y="502" fill="#DCCCB7" font-size="18" font-family="Arial, sans-serif">YOU marker and plan the first move.</text>
  </g>

  <g>
    <circle cx="660" cy="350" r="56" fill="#1A120D" stroke="#D5752D" stroke-width="3"/>
    <text x="626" y="340" fill="#F6EAD7" font-size="16" font-family="Arial, sans-serif">DRAW</text>
    <text x="617" y="365" fill="#DCCCB7" font-size="14" font-family="Arial, sans-serif">Fight starts</text>
    <text x="588" y="446" fill="#F6EAD7" font-size="24" font-weight="700" font-family="Arial, sans-serif">3. Live Combat</text>
    <text x="588" y="476" fill="#DCCCB7" font-size="18" font-family="Arial, sans-serif">The ring begins shrinking, objectives appear,</text>
    <text x="588" y="502" fill="#DCCCB7" font-size="18" font-family="Arial, sans-serif">and manual or Autopilot control goes live.</text>
  </g>

  <g>
    <circle cx="900" cy="350" r="56" fill="#142015" stroke="#7ED2B4" stroke-width="3"/>
    <text x="868" y="340" fill="#D9F7EE" font-size="16" font-family="Arial, sans-serif">PRESS</text>
    <text x="853" y="365" fill="#DCCCB7" font-size="14" font-family="Arial, sans-serif">Score swings</text>
    <text x="828" y="446" fill="#F6EAD7" font-size="24" font-weight="700" font-family="Arial, sans-serif">4. Mid-Round Pressure</text>
    <text x="828" y="476" fill="#DCCCB7" font-size="18" font-family="Arial, sans-serif">Drops, stagecoach runs, bounty marks,</text>
    <text x="828" y="502" fill="#DCCCB7" font-size="18" font-family="Arial, sans-serif">and cover fights decide the outcome.</text>
  </g>

  <g>
    <circle cx="1140" cy="350" r="56" fill="#201611" stroke="#F0BF76" stroke-width="3"/>
    <text x="1097" y="340" fill="#F6EAD7" font-size="16" font-family="Arial, sans-serif">LEDGER</text>
    <text x="1102" y="365" fill="#DCCCB7" font-size="14" font-family="Arial, sans-serif">Result closes</text>
    <text x="1018" y="446" fill="#F6EAD7" font-size="24" font-weight="700" font-family="Arial, sans-serif">5. Result + Settlement</text>
    <text x="1018" y="476" fill="#DCCCB7" font-size="18" font-family="Arial, sans-serif">The dossier explains placement, damage,</text>
    <text x="1018" y="502" fill="#DCCCB7" font-size="18" font-family="Arial, sans-serif">score, payout, and what to do next.</text>
  </g>

  <polygon points="254,344 280,350 254,356" fill="url(#amber)"/>
  <polygon points="494,344 520,350 494,356" fill="url(#amber)"/>
  <polygon points="734,344 760,350 734,356" fill="url(#amber)"/>
  <polygon points="974,344 1000,350 974,356" fill="url(#amber)"/>
</svg>
