<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="80" y1="40" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2A180F"/>
      <stop offset="1" stop-color="#0E0907"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="760" rx="28" fill="url(#bg3)"/>
  <rect x="28" y="28" width="1224" height="704" rx="24" stroke="#F0BF76" stroke-opacity="0.18" stroke-width="2"/>
  <text x="78" y="102" fill="#F0BF76" font-size="16" font-family="Arial, sans-serif" letter-spacing="4">ARENA LEGEND</text>
  <text x="78" y="150" fill="#F6EAD7" font-size="38" font-weight="700" font-family="Arial, sans-serif">What everything on the map means</text>
  <text x="78" y="188" fill="#DCCCB7" font-size="19" font-family="Arial, sans-serif">Once you can read these symbols, the match stops feeling random.</text>

  <rect x="88" y="236" width="500" height="420" rx="28" fill="#140D0A" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <rect x="118" y="266" width="440" height="360" rx="24" fill="#1A110D"/>
  <rect x="152" y="318" width="92" height="58" rx="12" fill="#2A1E16" stroke="#FFFFFF" stroke-opacity="0.1"/>
  <text x="172" y="352" fill="#DCCCB7" font-size="18" font-family="Arial, sans-serif">Saloon</text>
  <rect x="430" y="300" width="84" height="70" rx="12" fill="#2A1E16" stroke="#FFFFFF" stroke-opacity="0.1"/>
  <text x="448" y="340" fill="#DCCCB7" font-size="18" font-family="Arial, sans-serif">Hotel</text>
  <rect x="268" y="472" width="136" height="64" rx="12" fill="#2A1E16" stroke="#FFFFFF" stroke-opacity="0.1"/>
  <text x="292" y="510" fill="#DCCCB7" font-size="18" font-family="Arial, sans-serif">Wagon Yard</text>

  <circle cx="338" cy="446" r="162" stroke="#F0BF76" stroke-opacity="0.45" stroke-width="5"/>
  <circle cx="338" cy="446" r="5" fill="#F0BF76"/>

  <circle cx="258" cy="392" r="12" fill="#9CE9FF" stroke="#DFF9FF" stroke-width="2"/>
  <text x="218" y="415" fill="#DFF9FF" font-size="14" font-family="Arial, sans-serif" font-weight="700">YOU</text>

  <circle cx="404" cy="420" r="12" fill="#DF6C39" stroke="#FFD0AE" stroke-width="2"/>
  <text x="376" y="445" fill="#FFD0AE" font-size="13" font-family="Arial, sans-serif" font-weight="700">BOUNTY</text>

  <rect x="236" y="558" width="18" height="18" rx="4" fill="#F0BF76" stroke="#F8E3B4"/>
  <text x="264" y="573" fill="#F6EAD7" font-size="16" font-family="Arial, sans-serif">Supply drop</text>

  <rect x="418" y="516" width="26" height="20" rx="4" fill="#5A3826" stroke="#F6C27A" stroke-width="2"/>
  <text x="454" y="531" fill="#F6EAD7" font-size="16" font-family="Arial, sans-serif">Stagecoach route</text>

  <rect x="636" y="248" width="556" height="408" rx="28" fill="#140D0A" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <text x="672" y="304" fill="#F6EAD7" font-size="26" font-weight="700" font-family="Arial, sans-serif">Read the map like this</text>

  <circle cx="694" cy="360" r="14" fill="#9CE9FF" stroke="#DFF9FF" stroke-width="2"/>
  <text x="724" y="366" fill="#DCCCB7" font-size="18" font-family="Arial, sans-serif">Bright cyan marker tagged YOU = your rider.</text>

  <circle cx="694" cy="414" r="14" fill="#DF6C39" stroke="#FFD0AE" stroke-width="2"/>
  <text x="724" y="420" fill="#DCCCB7" font-size="18" font-family="Arial, sans-serif">Orange rider = current bounty target worth bonus score.</text>

  <rect x="682" y="458" width="26" height="26" rx="5" fill="#F0BF76" stroke="#F8E3B4"/>
  <text x="724" y="476" fill="#DCCCB7" font-size="18" font-family="Arial, sans-serif">Supply drop = health, ammo, and tempo swing.</text>

  <rect x="682" y="512" width="30" height="24" rx="5" fill="#5A3826" stroke="#F6C27A" stroke-width="2"/>
  <text x="724" y="530" fill="#DCCCB7" font-size="18" font-family="Arial, sans-serif">Stagecoach = moving score/ammo objective. Intercept it.</text>

  <rect x="682" y="556" width="26" height="26" rx="6" fill="#2A1E16" stroke="#FFFFFF" stroke-opacity="0.18"/>
  <text x="724" y="574" fill="#DCCCB7" font-size="18" font-family="Arial, sans-serif">Buildings and props are solid. Use them for cover.</text>

  <circle cx="696" cy="622" r="18" stroke="#F0BF76" stroke-width="4" stroke-opacity="0.45"/>
  <text x="724" y="628" fill="#DCCCB7" font-size="18" font-family="Arial, sans-serif">Dust ring = stay inside it or your rider starts burning down.</text>
</svg>
