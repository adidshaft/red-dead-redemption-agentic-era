<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="512" height="512" fill="none">
  <defs>
    <filter id="outerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <filter id="techGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="burntMetal" x1="118" y1="108" x2="354" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f4c885"/>
      <stop offset="45%" stop-color="#d5752d"/>
      <stop offset="100%" stop-color="#6f2a16"/>
    </linearGradient>
    <linearGradient id="sandText" x1="192" y1="68" x2="314" y2="446" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f6ead7"/>
      <stop offset="100%" stop-color="#f4c885"/>
    </linearGradient>
    <radialGradient id="dustGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 232) rotate(90) scale(208)">
      <stop offset="0%" stop-color="#2b1a12"/>
      <stop offset="65%" stop-color="#120b08"/>
      <stop offset="100%" stop-color="#0d0a08"/>
    </radialGradient>
  </defs>

  <g filter="url(#outerShadow)">
