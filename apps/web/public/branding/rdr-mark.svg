    <circle cx="250" cy="250" r="196" fill="none" stroke="#f4c885" stroke-opacity="0.12" stroke-width="2"/>
    <circle cx="250" cy="250" r="188" fill="none" stroke="#7ed2b4" stroke-width="2" stroke-dasharray="9 16" opacity="0.45"/>

    <path d="M180 200C180 140 320 140 320 200C320 272 282 295 266 360L250 393L234 360C218 295 180 272 180 200Z" fill="url(#burntMetal)" stroke="#120b08" stroke-width="4"/>
    <path d="M193 203C193 154 307 154 307 203C307 259 277 281 264 342L250 369L236 342C223 281 193 259 193 203Z" fill="#24150f" opacity="0.34"/>

    <path d="M180 190C119 190 62 162 41 112C92 139 151 149 195 160" fill="none" stroke="url(#burntMetal)" stroke-width="16" stroke-linecap="round"/>
    <path d="M320 190C381 190 438 162 459 112C408 139 349 149 305 160" fill="none" stroke="url(#burntMetal)" stroke-width="16" stroke-linecap="round"/>

    <polygon points="205,240 226,245 214,257" fill="#7ed2b4" filter="url(#techGlow)"/>
    <polygon points="295,240 274,245 286,257" fill="#7ed2b4" filter="url(#techGlow)"/>

    <path d="M250 141L250 202M230 170L211 170L205 191M270 170L289 170L295 191" fill="none" stroke="#7ed2b4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

    <path d="M147 349H353L374 378L353 407H147L126 378L147 349Z" fill="#120b08" stroke="#d5752d" stroke-width="4" stroke-linejoin="round"/>

    <text x="250" y="96" font-family="Georgia, serif" font-size="72" font-weight="700" fill="url(#sandText)" text-anchor="middle" letter-spacing="6">RDR</text>
    <text x="250" y="390" font-family="Verdana, Geneva, sans-serif" font-size="34" font-weight="700" fill="#f6dfb7" text-anchor="middle" letter-spacing="4.5">AGENTIC ERA</text>
